<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course Registration System — Sprint 2</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ─────────────────────────── TOP NAVIGATION ─────────────────────────── -->
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <span class="logo-dot"></span>
        <div>
          <div class="brand-title">VCU CourseHub</div>
          <div class="brand-sub" id="brandSub">Sprint 2 · Live Registration System</div>
        </div>
      </div>
      <nav class="nav" id="nav"><!-- injected by app.js based on auth state --></nav>
    </div>
  </header>

  <!-- ───────────────────────── GLOBAL TOAST AREA ────────────────────────── -->
  <div id="toast" class="toast" aria-live="polite"></div>

  <!-- ───────────────────────── MAIN VIEW ROUTER ─────────────────────────── -->
  <main class="wrap" id="main"><!-- each view is rendered into this container --></main>

  <!-- ─────────────────────────── MODAL ROOT ─────────────────────────────── -->
  <div id="modalRoot"></div>

  <script src="app.js"></script>
</body>
</html>
